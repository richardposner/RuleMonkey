default_install_hook_types: [pre-commit, pre-push]
default_stages: [pre-commit]
fail_fast: false

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=3000']  # accommodates basicmodels XMLs (r21 is 2.6MB)
      - id: mixed-line-ending
      - id: debug-statements
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v17.0.6
    hooks:
      - id: clang-format
        files: \.(c|cc|cpp|cxx|h|hh|hpp|hxx)$

  - repo: local
    hooks:
      - id: cmake-configure
        name: cmake-configure
        entry: cmake --preset release
        language: system
        pass_filenames: false
        stages: [pre-push]

      # Lints staged C++ TU files against .clang-tidy using whichever
      # compile_commands.json is available under build/.  The hook script
      # is intentionally soft: if clang-tidy or the compile DB is missing,
      # it skips with a hint rather than blocking the commit (so a fresh
      # clone or a non-LLVM dev machine doesn't get stuck).
      - id: clang-tidy
        name: clang-tidy
        entry: scripts/clang-tidy-staged.sh
        language: system
        files: ^(cpp|tests/cpp)/.+\.(c|cc|cpp|cxx)$
        pass_filenames: true
